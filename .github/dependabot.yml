version: 2
updates:
  # GitHub Actions（actions/checkout 等 workflow action 版本）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"

  # Swift Package（MCP SDK 等 SPM 依賴；exact pin、由 dependabot 提 PR 升版）
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "build"
      include: "scope"
