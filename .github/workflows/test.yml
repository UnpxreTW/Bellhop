name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    env:
      # SwiftStyleLint plugin：warning 升 error、直接 fail build
      SWIFTSTYLELINT_STRICT: '1'
    steps:
      - uses: actions/checkout@v7

      - name: Pin Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Probe toolchain
        run: swift --version

      - name: Test
        run: swift test
